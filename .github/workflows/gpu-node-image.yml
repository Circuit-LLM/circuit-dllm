name: gpu-node-image

# Build + publish the GPU contributor node image (docker/Dockerfile) to GHCR. Runs on GitHub's
# runners — no self-hosted box, no Docker-in-Docker on a pod — and pushes with the repo's own
# GITHUB_TOKEN (no PAT). Contributors then just `docker pull ghcr.io/circuit-llm/gpu-node`.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'engine/**'
      - '.github/workflows/gpu-node-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # free up runner disk — a CUDA+torch image is large
      - name: Reclaim disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/circuit-llm/gpu-node:latest
            ghcr.io/circuit-llm/gpu-node:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
